<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Novo cadastro administrativo da Escola Zona Sul.">
  <title>Novo Cadastro | Escola Zona Sul</title>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="cadastro">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Menu principal">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">EZ</span>
        <div>
          <strong>Escola Zona Sul</strong>
          <small>Gestão comunitária</small>
        </div>
      </div>

      <nav class="sidebar__nav">
        <a class="nav-link" href="index.html#dashboard">
          <span aria-hidden="true">H</span>
          Dashboard
        </a>
        <a class="nav-link" href="index.html#avisos">
          <span aria-hidden="true">!</span>
          Avisos
        </a>
        <a class="nav-link" href="index.html#eventos">
          <span aria-hidden="true">A</span>
          Agenda
        </a>
        <a class="nav-link" href="index.html#galeria">
          <span aria-hidden="true">G</span>
          Galeria
        </a>
        <details class="nav-group" data-admin-only open>
          <summary class="nav-link nav-link--summary active">
            <span aria-hidden="true">+</span>
            Cadastros
          </summary>
          <div class="nav-submenu">
            <a class="nav-sublink active" href="cadastro.html">Novo Cadastro</a>
            <a class="nav-sublink" href="enventos.html">Novo Evento</a>
            <a class="nav-sublink" href="painel.html">Painel Administrativo</a>
          </div>
        </details>
      </nav>
    </aside>

    <div class="main-wrap">
      <header class="topbar">
        <button class="icon-button menu-button" id="menuButton" type="button" aria-label="Abrir menu">
          ☰
        </button>

        <div>
          <p class="eyebrow">Entrada de dados</p>
          <h1>Novo cadastro</h1>
        </div>

        <div class="topbar__actions">
          <span class="auth-status" id="authStatus" hidden></span>
          <button class="button button--primary" id="openAuthModal" type="button">Login</button>
          <button class="button button--ghost" id="logoutButton" type="button" hidden>Sair</button>
        </div>
      </header>

      <main class="content">
        <section class="section" aria-labelledby="register-title">
          <div class="section__header">
            <div>
              <p class="eyebrow">Entrada de dados</p>
              <h2 id="register-title">Cadastro rápido</h2>
            </div>
            <button class="button button--primary" type="button" id="openAuthModalSecondary" data-admin-content>Abrir formulário</button>
          </div>

          <div class="empty-state admin-access-message" id="adminAccessMessage" hidden></div>

          <div class="register-panel" data-admin-content>
            <form class="quick-form" id="quickRegisterForm">
              <label>
                Tipo de perfil
                <select id="profileType" name="profileType" required>
                  <option value="Administrador">Administrador</option>
                  <option value="Professor">Professor</option>
                  <option value="Usuário">Usuário</option>
                </select>
              </label>

              <label>
                Nome
                <input id="name" name="name" type="text" placeholder="Digite o nome" required>
              </label>

              <label>
                E-mail
                <input id="email" name="email" type="email" placeholder="nome@email.com" required>
              </label>

              <label>
                Celular
                <input id="phone" name="phone" type="tel" placeholder="(00) 00000-0000">
              </label>

              <label>
                Senha
                <input id="quickPassword" name="senha" type="password" placeholder="Mínimo de 6 caracteres" autocomplete="new-password" minlength="6" required>
              </label>

              <label>
                Confirmar senha
                <input id="quickPasswordConfirm" name="confirmSenha" type="password" placeholder="Repita a senha" autocomplete="new-password" minlength="6" required>
              </label>

              <button class="button button--primary" type="submit">Salvar cadastro</button>
            </form>

            <aside class="profile-preview" aria-labelledby="profiles-title">
              <h3 id="profiles-title">Perfis do sistema</h3>
              <div class="profile-list" id="profileList"></div>
            </aside>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="modal" id="authModal" aria-hidden="true">
    <div class="modal__overlay" data-close-modal></div>
    <section class="modal__content modal__content--auth" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
      <div class="modal__header">
        <div>
          <p class="eyebrow" id="authModalEyebrow">Autenticação</p>
          <h2 id="authModalTitle">Acesse sua conta</h2>
        </div>
        <button class="icon-button" type="button" aria-label="Fechar modal" data-close-modal>×</button>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Autenticação">
        <button class="auth-tab is-active" type="button" role="tab" aria-selected="true" data-auth-tab="login">Login</button>
        <button class="auth-tab" type="button" role="tab" aria-selected="false" data-auth-tab="register">Novo Cadastro</button>
      </div>

      <form class="quick-form auth-panel" id="loginForm" data-auth-panel="login">
        <label>
          E-mail
          <input name="email" type="email" placeholder="nome@email.com" autocomplete="email" required>
        </label>

        <label>
          Senha
          <input name="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password" minlength="6" required>
        </label>

        <button class="button button--primary" type="submit">Entrar</button>
        <button class="button button--link auth-forgot-link" id="forgotPasswordLink" type="button">Esqueci minha senha</button>
      </form>

      <form class="quick-form auth-panel" id="forgotPasswordForm" data-auth-panel="forgot-password" hidden>
        <label>
          E-mail
          <input name="email" type="email" placeholder="nome@email.com" autocomplete="email" required>
        </label>

        <div class="auth-actions">
          <button class="button button--primary" type="submit">Enviar código</button>
          <button class="button button--link" id="backToLoginFromForgot" type="button">Voltar para login</button>
        </div>
      </form>

      <form class="quick-form auth-panel" id="resetPasswordForm" data-auth-panel="reset-password" hidden>
        <label>
          E-mail
          <input name="email" type="email" readonly required>
        </label>

        <label>
          Código de redefinição
          <input name="codigo" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required>
        </label>

        <label>
          Nova senha
          <input name="nova_senha" type="password" placeholder="Mínimo de 6 caracteres" autocomplete="new-password" minlength="6" required>
        </label>

        <div class="auth-actions">
          <button class="button button--primary" type="submit">Alterar senha</button>
          <button class="button button--link" id="requestNewResetCode" type="button">Solicitar novo código</button>
        </div>
      </form>

      <form class="quick-form auth-panel" id="modalRegisterForm" data-auth-panel="register" hidden>
        <label>
          Tipo de perfil
          <select disabled aria-label="Tipo de perfil">
            <option value="Usuário" selected>Usuário</option>
          </select>
          <input name="profileType" type="hidden" value="Usuário">
        </label>

        <label>
          Nome
          <input name="name" type="text" placeholder="Digite o nome" autocomplete="name" required>
        </label>

        <label>
          E-mail
          <input name="email" type="email" placeholder="nome@email.com" autocomplete="email" required>
        </label>

        <label>
          Celular
          <input name="phone" type="tel" placeholder="(00) 00000-0000" autocomplete="tel">
        </label>

        <label>
          Senha
          <input name="senha" type="password" placeholder="Mínimo de 6 caracteres" autocomplete="new-password" minlength="6" required>
        </label>

        <label>
          Confirmar senha
          <input name="confirmSenha" type="password" placeholder="Repita a senha" autocomplete="new-password" minlength="6" required>
        </label>

        <button class="button button--primary" type="submit">Cadastrar</button>
      </form>

      <form class="quick-form auth-panel" id="validationForm" data-auth-panel="validation" hidden>
        <label>
          E-mail
          <input name="email" type="email" readonly required>
        </label>

        <label>
          Código de validação
          <input name="codigo" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required>
        </label>

        <div class="auth-actions">
          <button class="button button--primary" type="submit">Validar cadastro</button>
          <button class="button button--link" id="resendValidationCode" type="button">Reenviar código</button>
        </div>
      </form>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/services.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/events.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
